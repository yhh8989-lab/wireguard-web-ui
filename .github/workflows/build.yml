name: Build Linux Binary

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true
        
    - name: Download Go dependencies
      run: go mod download
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Prepare assets
      run: |
        chmod +x ./prepare_assets.sh
        ./prepare_assets.sh
        
    - name: Build
      run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o wireguard-ui-linux-amd64 .
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-ui-linux-amd64
        path: wireguard-ui-linux-amd64
        retention-days: 30
        
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: 'Auto-generated release from build'
        draft: false
        files: |
          wireguard-ui-linux-amd64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
